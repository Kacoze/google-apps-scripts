name: Release Readiness

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run release:check
